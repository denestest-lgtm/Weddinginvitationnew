<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Denes & Ana</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #C5A059;
            --overlay-color: rgba(0,0,0,0.6);
            --bg-light: #fdfaf7;
            --text-dark: #4a4a4a;
            --soft-gold: #f4e9e0;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- PAGE 1: OPENING (COVER) --- */
        #opening-page {
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(var(--overlay-color), var(--overlay-color)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            z-index: 999;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 20px;
        }

        .animate-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 10vw, 6rem);
            color: var(--primary-gold);
            margin: 15px 0;
            animation: zoomFade 2.5s infinite alternate;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes zoomFade {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Seksi Pencarian */
        #search-container {
            margin-top: 30px;
            display: block; /* Pastikan terlihat di awal */
        }

        .guest-label { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.9; }
        
        #search-container input {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            width: 280px;
            max-width: 90%;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 15px;
            outline: none;
            color: #333;
        }

        .guest-name { 
            font-size: 1.8rem; 
            font-weight: 500; 
            color: var(--primary-gold); 
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        #error-message {
            display: none;
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .btn-open {
            padding: 12px 35px;
            background: var(--primary-gold);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-open:hover { transform: scale(1.05); background: #ab8947; }
        .btn-open:disabled { background: #888; cursor: not-allowed; }

        /* --- PAGE 2: MAIN CONTENT --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        section { padding: 80px 20px; max-width: 900px; margin: auto; text-align: center; }
        h3 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--primary-gold); margin-top: 0; }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 50px;
            height: 400px;
        }

        .gallery-item {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 20px;
            transition: opacity 0.8s ease-in-out;
        }

        .comment-section {
            background-color: #fff; padding: 30px; border-radius: 25px;
            margin-top: 30px; text-align: left; border: 1px solid #f0f0f0;
        }

        .hidden-up { transform: translateY(-100vh); }
        .show-content { display: block !important; opacity: 1 !important; }

        @media (max-width: 768px) {
            .gallery-container { grid-template-columns: 1fr; height: auto; }
            .gallery-item { height: 250px; }
        }
    </style>
</head>
<body>

    <!-- PAGE 1 -->
    <div id="opening-page">
        <p style="letter-spacing: 5px;">THE WEDDING OF</p>
        <h2 class="animate-title">Denes & Ana</h2>
        <p>12 . 12 . 2026</p>

        <!-- Container Pencarian -->
        <div id="search-container">
            <p class="guest-label">Cari Nama Anda di Daftar Undangan:</p>
            <input type="text" id="nameInputManual" placeholder="Ketik nama lengkap Anda...">
            <br>
            <button class="btn-open" id="searchBtn" onclick="manualSearch()">CEK DAFTAR</button>
            <div id="error-message">Nama tidak terdaftar dalam daftar tamu.</div>
        </div>

        <!-- Container Hasil Jika Ditemukan -->
        <div id="guest-found-area" style="display: none; margin-top: 25px;">
            <p class="guest-label">Selamat Datang, Bapak/Ibu/Sdr/i:</p>
            <div class="guest-name" id="guest-target"></div>
            <button class="btn-open" onclick="openInvitation()">BUKA UNDANGAN</button>
        </div>
    </div>

    <!-- PAGE 2 -->
    <div id="main-content">
        <section>
            <h3>Assalamu’alaikum Wr. Wb.</h3>
            <p>Maha Suci Allah yang telah menciptakan makhluk-Nya berpasang-pasangan.</p>
            <div class="gallery-container">
                <img id="img1" class="gallery-item" src="" alt="G1">
                <img id="img2" class="gallery-item" src="" alt="G2">
                <img id="img3" class="gallery-item" src="" alt="G3">
            </div>
        </section>

        <section id="comments">
            <div class="comment-section">
                <h3 style="text-align: center; font-size: 2rem;">Buku Tamu</h3>
                <div class="comment-form">
                    <input type="text" id="guestName" placeholder="Nama Anda" readonly>
                    <textarea id="guestComment" rows="3" placeholder="Tulis ucapan doa..."></textarea>
                    <button class="btn-send" id="submitBtn" onclick="submitToSheets()" style="width:100%; padding:10px; background:var(--primary-gold); color:white; border:none; border-radius:20px; cursor:pointer;">Kirim Ucapan</button>
                </div>
                <div id="commentDisplay" style="margin-top:20px;"></div>
            </div>
        </section>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxA0Z1YA_LZNmlE_XFcPEP_j8pvkazcYZoYLIo7vcRUHKy6CWH1BPfLTOCNRQtOj4rrw/exec';
        let guestDatabase = [];

        // 1. Ambil data tamu saat pertama kali load
        async function fetchGuestList() {
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.innerText = "MEMUAT DATA...";

            try {
                const response = await fetch(`${scriptURL}?action=getGuests`);
                guestDatabase = await response.json();
                console.log("Database dimuat:", guestDatabase);
                
                btn.disabled = false;
                btn.innerText = "CEK DAFTAR";

                // Baru jalankan cek URL kalau database sudah ada
                checkUrlParam();
            } catch (e) {
                console.error("Gagal load database:", e);
                btn.innerText = "GAGAL LOAD";
            }
        }

        // 2. Fungsi Search Manual
        function manualSearch() {
            const val = document.getElementById('nameInputManual').value.trim().toLowerCase();
            const error = document.getElementById('error-message');
            
            if (guestDatabase.includes(val)) {
                error.style.display = 'none';
                showGuestResult(val);
            } else {
                error.style.display = 'block';
                error.innerText = "Nama tidak terdaftar dalam daftar tamu.";
            }
        }

        // 3. Tampilkan hasil jika nama ada
        function showGuestResult(name) {
            document.getElementById('search-container').style.display = 'none';
            document.getElementById('guest-found-area').style.display = 'block';
            document.getElementById('guest-target').innerText = name;
            document.getElementById('guestName').value = name.toUpperCase();
        }

        // 4. Cek ?to=Nama di URL
        function checkUrlParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const to = urlParams.get('to');
            if (to) {
                const clean = to.replace(/\+/g, ' ').toLowerCase();
                if (guestDatabase.includes(clean)) {
                    showGuestResult(clean);
                }
            }
        }

        function openInvitation() {
            document.getElementById('opening-page').classList.add('hidden-up');
            document.getElementById('main-content').classList.add('show-content');
            window.scrollTo(0, 0);
            loadComments();
        }

        // --- Sisanya fungsi Gallery & Komentar (sama seperti sebelumnya) ---
        const photoDatabase = ["https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600", "https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600", "https://images.unsplash.com/photo-1494774157365-9e04c6720e47?w=600"];
        let idx = 0;
        function updateGallery() {
            const imgs = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
            if(!imgs[0]) return;
            imgs.forEach((img, i) => { img.src = photoDatabase[(idx + i) % photoDatabase.length]; });
            idx = (idx + 1) % photoDatabase.length;
        }

        async function loadComments() {
            const display = document.getElementById('commentDisplay');
            display.innerHTML = 'Memuat doa...';
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                display.innerHTML = '';
                data.reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.style.borderBottom = "1px solid #eee";
                    div.style.padding = "10px 0";
                    div.innerHTML = `<strong>${item.name}</strong><p>${item.comment}</p>`;
                    display.appendChild(div);
                });
            } catch (e) { display.innerHTML = 'Gagal memuat.'; }
        }

        async function submitToSheets() {
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('guestName').value;
            const comm = document.getElementById('guestComment').value;
            if(!comm) return alert("Tulis ucapan dulu!");
            btn.disabled = true; btn.innerText = "Mengirim...";
            try {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ name, comment: comm }) });
                document.getElementById('guestComment').value = '';
                alert("Terima kasih!"); loadComments();
            } catch (e) { alert("Error!"); } finally { btn.disabled = false; btn.innerText = "Kirim Ucapan"; }
        }

        window.onload = () => {
            fetchGuestList(); // Panggil data dari Sheets
            updateGallery();
            setInterval(updateGallery, 5000);
        };
    </script>
</body>
</html>
